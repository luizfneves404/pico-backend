[loggers]
keys=root, sqlalchemy, python_multipart, factory_boy, uvicorn, arq, faker

[handlers]
keys=consoleHandler, adminEmailHandler

[formatters]
keys=consoleFormatter

[logger_root]
level=DEBUG
handlers=consoleHandler, adminEmailHandler

[logger_sqlalchemy]
level=INFO
handlers=
qualname=sqlalchemy.engine
propagate=1

[logger_python_multipart]
level=INFO
handlers=
qualname=python_multipart
propagate=1

[logger_factory_boy]
level=INFO
handlers=
qualname=factory
propagate=1

[logger_uvicorn]
level=INFO
handlers=
qualname=uvicorn
propagate=1

[logger_arq]
level=INFO
handlers=
qualname=arq
propagate=1

[logger_faker]
level=INFO
handlers=
qualname=faker
propagate=1

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=consoleFormatter
args=(sys.stdout,)

[handler_adminEmailHandler]
class=app.mail.AdminEmailHandler
level=ERROR
formatter=consoleFormatter

[formatter_consoleFormatter]
format=%(asctime)s %(levelname)s %(name)s: %(message)s
