services:
  app:
    build: 
      context: ./app
      dockerfile: Dockerfile.app
      args:
        - INSTALL_TEST=true
    volumes:
      - ./poetry_cache:/tmp/poetry_cache
    command: ./docker-test-entrypoint.sh
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    environment:
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: 8000
      UVICORN_RELOAD: false

      DATABASE_URL: postgresql+asyncpg://postgres:REDACTED_DB_PASSWORD@postgres:5432/picodb
      REDIS_URL: redis://redis:6379

      SECRET_KEY: =REDACTED_SECRET_KEY

      AWS_SES_FROM_EMAIL: pico@example.com
  
  worker:
    build: 
      context: ./app
      dockerfile: Dockerfile.worker
    command: ./docker-worker-entrypoint.sh
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

    environment:
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: 8000
      UVICORN_RELOAD: false

      DATABASE_URL: postgresql+asyncpg://postgres:REDACTED_DB_PASSWORD@postgres:5432/picodb
      REDIS_URL: redis://redis:6379
      
      SECRET_KEY: =REDACTED_SECRET_KEY

      AWS_SES_FROM_EMAIL: pico@example.com
  
  redis:
    image: redis:latest
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: ankane/pgvector
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: REDACTED_DB_PASSWORD
      DB_NAME: picodb
    volumes:
      - ./docker-entrypoint-initdb.d/:/docker-entrypoint-initdb.d/
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
