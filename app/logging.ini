[loggers]
keys=root,sqlalchemy,python_multipart,factory_boy

[handlers]
keys=consoleHandler

[formatters]
keys=consoleFormatter

[logger_root]
level=DEBUG
handlers=consoleHandler

[logger_sqlalchemy]
level=INFO
handlers=
qualname=sqlalchemy.engine
propagate=1

[logger_python_multipart]
level=INFO
handlers=
qualname=python_multipart
propagate=1

[logger_factory_boy]
level=INFO
handlers=
qualname=factory
propagate=1

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=consoleFormatter
args=(sys.stdout,)

[formatter_consoleFormatter]
format=%(asctime)s %(levelname)s %(name)s: %(message)s
