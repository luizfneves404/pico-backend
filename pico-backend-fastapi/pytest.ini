[pytest]
addopts = --show-capture=no --capture=no -p no:logging
pythonpath = .
testpaths = tests

filterwarnings = 
    ignore:.*SWIG.*__module__.*:DeprecationWarning
    ignore:.*SwigPyObject.*__module__.*:DeprecationWarning
    ignore:.*SwigPyPacked.*__module__.*:DeprecationWarning
    ignore:.*swigvarlink.*__module__.*:DeprecationWarning
    ignore:Support for class-based `config` is deprecated.*:pydantic.warnings.PydanticDeprecatedSince20

