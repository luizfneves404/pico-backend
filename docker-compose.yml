services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        - INSTALL_TEST=false
    volumes:
      - ./poetry_cache:/tmp/poetry_cache
    command: /bin/bash docker/docker-entrypoint.sh
    ports:
      - "80:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
        
    environment:
      - ADMIN_URL=admin
      - AMPLITUDE_TRACK_EVENTS=false
      - AWS_SES_FROM_EMAIL=pico@example.com
      - DATABASE_URL=postgresql+asyncpg://postgres:REDACTED_DB_PASSWORD@postgres:5432/picodb
      - DJANGO_DATABASE_URL=postgresql://postgres:REDACTED_DB_PASSWORD@postgres:5432/picodb
      - DJANGO_HOST=django.localtest.me
      - DOCS_URL=/docs
      - ENVIRONMENT=test
      - FASTAPI_HOST=fastapi.localtest.me
      - FCM_DRY_RUN=true
      - OPENAPI_API_KEY=123456
      - OPENAPI_URL=/openapi.json
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=REDACTED_SECRET_KEY
      - STORAGE__BACKEND=local
      - STORAGE__BASE_PATH=storage
      - TEXTRACT_PROFILE_NAME=eonfweogfnw-2385545
      - TEXTRACT_REGION_NAME=us-east-1
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8000
      - UVICORN_RELOAD=false
      - GOOGLE_CLIENT_ID=123456
      - APPLE_APP_ID=123456
      - MOCK_OPENAI=true
      - MOCK_GEMINI=true

      # API Keys
      - AMPLITUDE_API_KEY
      - AMPLITUDE_SECRET_KEY
      - BRANCH_API_KEY
      - BRANCH_API_KEY_TEST
      - FIREBASE_JSON_SERVICE_KEY
      - GEMINI_API_KEY
      - OPENAI_API_KEY
      - PEN_TO_PRINT_RAPIDAPI_KEY
      - TINIFY_API_KEY
      
      # Other configuration
      - ADMIN_EMAILS
      - ADMIN_NAMES
  
  worker:
    build: 
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - ./app:/code/app
    command: docker/docker-worker-entrypoint.sh
    healthcheck:
      test: [ "CMD", "python", "-m", "app.arq_worker", "--check" ]
      interval: 5s
      timeout: 5s
      retries: 5
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      
    environment:
      - ADMIN_URL=admin
      - AMPLITUDE_TRACK_EVENTS=false
      - AWS_SES_FROM_EMAIL=pico@example.com
      - DATABASE_URL=postgresql+asyncpg://postgres:REDACTED_DB_PASSWORD@postgres:5432/picodb
      - DJANGO_DATABASE_URL=postgresql://postgres:REDACTED_DB_PASSWORD@postgres:5432/picodb
      - DJANGO_HOST=django.localtest.me
      - DOCS_URL=/docs
      - ENVIRONMENT=test
      - FASTAPI_HOST=fastapi.localtest.me
      - FCM_DRY_RUN=true
      - OPENAPI_API_KEY=123456
      - OPENAPI_URL=/openapi.json
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=REDACTED_SECRET_KEY
      - STORAGE__BACKEND=local
      - STORAGE__BASE_PATH=storage
      - TEXTRACT_PROFILE_NAME=eonfweogfnw-2385545
      - TEXTRACT_REGION_NAME=us-east-1
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8000
      - UVICORN_RELOAD=false
      - GOOGLE_CLIENT_ID=123456
      - APPLE_APP_ID=123456
      - MOCK_OPENAI=true
      - MOCK_GEMINI=true

      # API Keys
      - AMPLITUDE_API_KEY
      - AMPLITUDE_SECRET_KEY
      - BRANCH_API_KEY
      - BRANCH_API_KEY_TEST
      - FIREBASE_JSON_SERVICE_KEY
      - GEMINI_API_KEY
      - OPENAI_API_KEY
      - PEN_TO_PRINT_RAPIDAPI_KEY
      - TINIFY_API_KEY
      
      # Other configuration
      - ADMIN_EMAILS
      - ADMIN_NAMES
  
  redis:
    image: redis:latest
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    build:
      context: .
      dockerfile: docker/Dockerfile.postgres
      args:
        - POSTGRES_VERSION=17
        - PGVECTOR_VERSION=v0.8.0
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: REDACTED_DB_PASSWORD
      DB_NAME: picodb
    volumes:
      - ./docker/docker-entrypoint-initdb.d/:/docker-entrypoint-initdb.d/
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5