  #     DATABASE_URL: postgresql+asyncpg://postgres:REDACTED_DB_PASSWORD@postgres:5432/picodb
  #     REDIS_URL: redis://redis:6379
  #     SECRET_KEY: =REDACTED_SECRET_KEY

  #     AWS_SES_FROM_EMAIL: pico@example.com

  celery:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - ./poetry_cache:/tmp/poetry_cache
    command: /bin/bash docker/docker-celery-entrypoint.sh
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      
    environment:
      - ENVIRONMENT=test
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8000
      - UVICORN_RELOAD=false

      - DJANGO_DATABASE_URL=postgresql+asyncpg://postgres:REDACTED_DB_PASSWORD@postgres:5432/picodb
      - DATABASE_URL=postgresql+asyncpg://postgres:REDACTED_DB_PASSWORD@postgres:5432/picodb
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=REDACTED_SECRET_KEY

      - AWS_SES_FROM_EMAIL=pico@example.com

      - ADMIN_URL=admin
      - OPENAPI_URL=/openapi.json
      - DOCS_URL=/docs
      - OPENAPI_API_KEY=123456

      - DJANGO_HOST=django.localtest.me
      - FASTAPI_HOST=fastapi.localtest.me

      - TEXTRACT_REGION_NAME=us-east-1
      - TEXTRACT_PROFILE_NAME=eonfweogfnw-2385545

      - STORAGE__BACKEND=local
      - STORAGE__BASE_PATH=storage

      - AMPLITUDE_TRACK_EVENTS=false

      - FCM_DRY_RUN=true

      - ADMIN_NAMES
      - ADMIN_EMAILS
      - FIREBASE_JSON_SERVICE_KEY
      - AMPLITUDE_API_KEY
      - AMPLITUDE_SECRET_KEY
      - OPENAI_API_KEY
      - GEMINI_API_KEY
      - BRANCH_API_KEY
      - BRANCH_API_KEY_TEST
      - PEN_TO_PRINT_RAPIDAPI_KEY
      - TINIFY_API_KEY
    
    healthcheck:
      test: [ "CMD-SHELL", "PYTHONPATH=./pico_django celery -A pico_backend status" ]
      interval: 5s
      timeout: 5s
      retries: 5
  
  redis:
    image: redis:latest
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: ankane/pgvector
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: REDACTED_DB_PASSWORD
      DB_NAME: picodb
    volumes:
      - ./docker/docker-entrypoint-initdb.d/:/docker-entrypoint-initdb.d/
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5