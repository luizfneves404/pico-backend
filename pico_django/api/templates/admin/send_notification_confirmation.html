{% extends "admin/base_site.html" %}

{% block content %}
<div class="content-main">
    <p>
        You are about to send a notification to {{ users_count }} user{{ users_count|pluralize }}.
    </p>
    
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Send</button>
    </form>
</div>
{% endblock %}
