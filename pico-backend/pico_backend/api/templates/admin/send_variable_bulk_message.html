{% extends "admin/base_site.html" %}
{% block content %}
<h1>Send Variable Bulk Messages</h1>
<p>
    The CSV file should have two columns: "username" and "content".
</p>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Send</button>
</form>
{% endblock %}
